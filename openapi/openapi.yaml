components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: 'Recommended. Send `Authorization: Bearer <api_key>`.'
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Alternative API key header.
  schemas:
    AgentsApiEnvelope:
      type: object
      properties:
        ok:
          type: boolean
        data:
          type: object
          additionalProperties: true
        error:
          "$ref": "#/components/schemas/AgentsApiError"
        request_id:
          type: string
      required:
      - ok
    AgentsApiError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    AgentsApiErrorEnvelope:
      type: object
      properties:
        ok:
          type: boolean
          enum:
          - false
        error:
          "$ref": "#/components/schemas/AgentsApiError"
        request_id:
          type: string
      required:
      - ok
      - error
  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/AgentsApiErrorEnvelope"
    Unauthorized:
      description: Missing, invalid, revoked, or suspended API key.
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/AgentsApiErrorEnvelope"
    Forbidden:
      description: Caller role, scope, or API group is not authorized.
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/AgentsApiErrorEnvelope"
    NotFound:
      description: Resource or route not found.
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/AgentsApiErrorEnvelope"
    RateLimited:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/AgentsApiErrorEnvelope"

