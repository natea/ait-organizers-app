        required: false
        schema:
          type: string
        description: Optional current stage filter.
      - name: client_email
        in: query
        required: false
        schema:
          type: string
        description: Optional requester email filter. Only useful for callers with
          broad visibility.
      - name: since
        in: query
        required: false
