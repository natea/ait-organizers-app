  "/api/agents/v1/availability/find_slots":
    get:
      operationId: availability_find_slots
      summary: Availability find slots
      description: Find candidate meeting slots across selected shared calendar feeds
        using duration, working hours, minimum notice, buffer, and date range. Returns
        privacy-safe slot recommendations with inferred city-level location for each
        selected person, a 30-minute location_timeline with exact-interval flight/location
        samples, plus meeting_preferences text; honor those preferences before offering
        or booking slots. For travel, use the sample overlapping each candidate slot
        so mid-day flight destination changes control the displayed timezone and acceptable
        local hours.
      tags:
      - Availability
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AgentsApiEnvelope"
