      x-mcp-tool-name: availability_calendar_create_event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                people:
                  type: array
                  items:
                    type: string
                  description: Whose calendar to write to (e.g. ["jake"] or ["joe"]).
                    Required.
                emails:
                  type: array
                  items:
                    type: string
                  description: Email-based filter. Alternative to people.
                summary:
                  type: string
                  description: Event title.
                starts_at:
                  type: string
                  description: ISO 8601 start time (e.g. 2026-06-17T14:00:00-07:00).
                ends_at:
                  type: string
                  description: ISO 8601 end time.
                attendees:
                  type: array
                  items:
                    type: object
                    properties:
                      email:
                        type: string
                      display_name:
                        type: string
                    required:
                    - email
                  description: List of attendees to invite. The calendar owner is
                    always added automatically.
                description:
                  type: string
                  description: Optional event body/description.
                location:
                  type: string
                  description: Optional location string.
                all_day:
                  type: boolean
                  description: Set true for all-day events (default false).
                  default: false
                timezone:
                  type: string
                  description: IANA timezone for interpreting starts_at/ends_at if
